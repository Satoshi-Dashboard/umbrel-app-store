version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: satoshi-dashboard_web_1
      APP_PORT: 8787
      PROXY_AUTH_ADD: "false"

  web:
    image: ghcr.io/satoshi-dashboard/main:v1.0.0
    restart: on-failure
    stop_grace_period: 1m
    environment:
      SERVE_STATIC: "true"
      API_PORT: 8787
      API_HOST: 0.0.0.0
    volumes:
      - ${APP_DATA_DIR}/data:/app/server/.runtime-cache
