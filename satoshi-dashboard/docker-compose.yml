services:
  app_proxy:
    image: ghcr.io/getumbrel/app-proxy:v1
    environment:
      APP_HOST: satoshi-dashboard_web_1
      APP_PORT: 8787
      PROXY_AUTH_ADD: "false"
    restart: on-failure

  web:
    image: ghcr.io/satoshi-dashboard/main:v1.0.0
    restart: on-failure
    stop_grace_period: 1m
    user: "1000:1000"
    environment:
      SERVE_STATIC: "true"
      API_PORT: 8787
      API_HOST: 0.0.0.0
    volumes:
      - ${APP_DATA_DIR}/data:/app/server/.runtime-cache

networks:
  default:
    name: ${APP_NAME}_network
    driver: bridge
